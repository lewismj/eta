<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'none'; style-src {{cspSource}}; script-src 'nonce-{{nonce}}'; img-src {{cspSource}} data:;">
    <title>Eta Environment Inspector</title>
    <link rel="stylesheet" href="{{cssUri}}">
</head>
<body>
    <header class="header">
        <h2>Eta Environment Inspector</h2>
        <div class="toolbar">
            <button id="refreshBtn" class="btn">Refresh</button>
            <button id="collapseBtn" class="btn secondary">Collapse All</button>
        </div>
        <div class="filters">
            <label><input type="checkbox" id="followActiveFrame"> Follow frame</label>
            <label><input type="checkbox" id="showLocals"> Locals</label>
            <label><input type="checkbox" id="showClosures"> Closures</label>
            <label><input type="checkbox" id="showGlobals"> Module</label>
            <label><input type="checkbox" id="showBuiltins"> Builtins</label>
            <label><input type="checkbox" id="showInternal"> Internal</label>
            <label><input type="checkbox" id="showNil"> Nil</label>
            <label><input type="checkbox" id="showChangedOnly"> Changed Only</label>
        </div>
    </header>

    <div id="error" class="error" style="display:none;"></div>
    <div id="status" class="status"></div>
    <div id="environments" class="tree"></div>

    <script nonce="{{nonce}}" src="{{jsUri}}"></script>
</body>
</html>
