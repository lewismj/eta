name: Release Bundle

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Version tag (e.g. v0.1.0) — used for archive naming'
        required: false
        default: 'dev'

permissions:
  contents: write

env:
  VCPKG_DEFAULT_TRIPLET: x64-linux
  CMAKE_BUILD_PARALLEL_LEVEL: 4

jobs:
  # ════════════════════════════════════════════════════════════════════
  # Linux x86_64
  # ════════════════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-24.04
    env:
      VERSION: ${{ github.ref_name || inputs.tag_name || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set bundle name
        run: echo "BUNDLE=eta-${VERSION}-linux-x86_64" >> $GITHUB_ENV

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build nodejs npm

      - name: Install Boost via vcpkg
        env:
          # Authenticate GitHub downloads → 5000 req/hr instead of 60 req/hr (anonymous).
          # This is the primary fix for "vcpkg_download_distfile failed".
          X_VCPKG_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cache built binaries in the GitHub Actions cache so subsequent runs
          # skip the download+build entirely.
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git /tmp/vcpkg
          /tmp/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          /tmp/vcpkg/vcpkg install boost-test:x64-linux boost-unordered:x64-linux
          echo "VCPKG_ROOT=/tmp/vcpkg" >> $GITHUB_ENV

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/dist/${{ env.BUNDLE }}

      - name: Build
        run: cmake --build build

      - name: Install
        run: cmake --install build

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.18'

      - name: Build VS Code extension
        run: |
          cd editors/vscode
          npm ci

          # Strip leading 'v' to get semver (v0.1.8 → 0.1.8).
          # For workflow_dispatch / 'dev', fall back to 'latest'.
          SEMVER="${VERSION#v}"
          if echo "$SEMVER" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
            npm version "$SEMVER" --no-git-tag-version --allow-same-version
            LABEL="$SEMVER"
          else
            LABEL="latest"
          fi

          npx vsce package -o "eta-lang-${LABEL}.vsix" --skip-license
          echo "VSIX_LABEL=${LABEL}" >> $GITHUB_ENV

      - name: Assemble bundle
        run: |
          PREFIX=${{ github.workspace }}/dist/${{ env.BUNDLE }}

          mkdir -p "$PREFIX/editors"
          cp "editors/vscode/eta-lang-${{ env.VSIX_LABEL }}.vsix" "$PREFIX/editors/"

          # Install script + docs
          cp scripts/install.sh "$PREFIX/" && chmod +x "$PREFIX/install.sh"
          cp TESTING.md         "$PREFIX/"

          # Ensure binaries are executable
          chmod +x "$PREFIX/bin/"*

      - name: Create archive
        run: |
          cd ${{ github.workspace }}/dist
          tar -czf ${{ env.BUNDLE }}.tar.gz ${{ env.BUNDLE }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUNDLE }}
          path: dist/${{ env.BUNDLE }}.tar.gz

  # ════════════════════════════════════════════════════════════════════
  # Windows x64
  # ════════════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    env:
      VERSION: ${{ github.ref_name || inputs.tag_name || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set bundle name
        shell: pwsh
        run: echo "BUNDLE=eta-${env:VERSION}-win-x64" >> $env:GITHUB_ENV

      - name: Install Boost via vcpkg
        shell: pwsh
        env:
          # Authenticate GitHub downloads → avoids anonymous rate-limit failures.
          X_VCPKG_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cache built binaries; subsequent runs skip download+build.
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: |
          $vcpkg = "${{ runner.temp }}\vcpkg"
          git clone --depth 1 https://github.com/microsoft/vcpkg.git $vcpkg
          & "$vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          & "$vcpkg\vcpkg" install boost-test:x64-windows boost-unordered:x64-windows
          echo "VCPKG_DIR=$vcpkg" >> $env:GITHUB_ENV

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_DIR }}\scripts\buildsystems\vcpkg.cmake
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}\dist\${{ env.BUNDLE }}

      - name: Build
        run: cmake --build build --config Release

      - name: Install
        run: cmake --install build --config Release

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.18'

      - name: Build VS Code extension
        shell: pwsh
        run: |
          cd editors\vscode
          npm ci

          # Strip leading 'v' to get semver (v0.1.8 → 0.1.8).
          # For workflow_dispatch / 'dev', fall back to 'latest'.
          $semver = "${{ env.VERSION }}" -replace '^v',''
          if ($semver -match '^\d+\.\d+\.\d+') {
            npm version $semver --no-git-tag-version --allow-same-version
            $label = $semver
          } else {
            $label = "latest"
          }

          npx vsce package -o "eta-lang-${label}.vsix" --skip-license
          echo "VSIX_LABEL=${label}" >> $env:GITHUB_ENV

      - name: Assemble bundle
        shell: pwsh
        run: |
          $prefix = "${{ github.workspace }}\dist\${{ env.BUNDLE }}"

          New-Item -ItemType Directory -Force "$prefix\editors" | Out-Null
          Copy-Item "editors\vscode\eta-lang-${{ env.VSIX_LABEL }}.vsix" "$prefix\editors\"

          Copy-Item "scripts\install.ps1" "$prefix\" -ErrorAction SilentlyContinue
          Copy-Item "scripts\install.cmd" "$prefix\" -ErrorAction SilentlyContinue
          Copy-Item "TESTING.md"          "$prefix\" -ErrorAction SilentlyContinue

      - name: Create archive
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "${{ github.workspace }}\dist\${{ env.BUNDLE }}" `
            -DestinationPath "${{ github.workspace }}\dist\${{ env.BUNDLE }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUNDLE }}
          path: dist/${{ env.BUNDLE }}.zip

  # ════════════════════════════════════════════════════════════════════
  # Create GitHub Release (on tag push only)
  # ════════════════════════════════════════════════════════════════════
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/eta-${{ env.VERSION }}-linux-x86_64/eta-${{ env.VERSION }}-linux-x86_64.tar.gz
            artifacts/eta-${{ env.VERSION }}-win-x64/eta-${{ env.VERSION }}-win-x64.zip
